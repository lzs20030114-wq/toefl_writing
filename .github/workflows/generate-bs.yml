name: Generate Build Sentence Questions

on:
  workflow_dispatch:
    inputs:
      target_sets:
        description: "Number of sets to generate"
        required: true
        default: "6"
        type: string

concurrency:
  group: generate-bs-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate questions to staging
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          CLAUDE_RELAY_API_KEY: ${{ secrets.CLAUDE_RELAY_API_KEY }}
          CLAUDE_RELAY_BASE_URL: ${{ vars.CLAUDE_RELAY_BASE_URL }}
          CLAUDE_RELAY_API_KEY_2: ${{ secrets.CLAUDE_RELAY_API_KEY_2 }}
          CLAUDE_RELAY_BASE_URL_2: ${{ vars.CLAUDE_RELAY_BASE_URL_2 }}
          CLAUDE_RELAY_API_KEY_3: ${{ secrets.CLAUDE_RELAY_API_KEY_3 }}
          CLAUDE_RELAY_BASE_URL_3: ${{ vars.CLAUDE_RELAY_BASE_URL_3 }}
          CLAUDE_GENERATOR_MODEL: ${{ vars.CLAUDE_GENERATOR_MODEL }}
          BS_TARGET_SETS: ${{ github.event.inputs.target_sets }}
          BS_OUTPUT_PATH: data/buildSentence/staging/${{ github.run_id }}.json
          BS_JOB_STATE_PATH: data/buildSentence/staging/${{ github.run_id }}.state.json
          BS_RESERVE_PATH: data/buildSentence/staging/${{ github.run_id }}.reserve.json
          BS_CIRCUIT_BREAKER_LOG_PATH: data/buildSentence/staging/${{ github.run_id }}.circuit-breaker-log.json
        run: node scripts/generateBSQuestions.mjs

      - name: Persist generated artifacts
        if: always()
        env:
          RUN_ID: ${{ github.run_id }}
          BS_TARGET_SETS: ${{ github.event.inputs.target_sets }}
        shell: bash
        run: |
          set -u

          STATE="data/buildSentence/staging/${RUN_ID}.state.json"
          STAGING="data/buildSentence/staging/${RUN_ID}.json"
          RESERVE="data/buildSentence/staging/${RUN_ID}.reserve.json"
          CIRCUIT_BREAKER="data/buildSentence/staging/${RUN_ID}.circuit-breaker-log.json"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          FILES=()
          [ -f "$STATE" ] && FILES+=("$STATE")
          [ -f "$STAGING" ] && FILES+=("$STAGING")
          [ -f "$RESERVE" ] && FILES+=("$RESERVE")
          [ -f "$CIRCUIT_BREAKER" ] && FILES+=("$CIRCUIT_BREAKER")

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No workflow artifacts found; nothing to commit."
            exit 0
          fi

          git add -- "${FILES[@]}"

          if git diff --staged --quiet; then
            echo "No artifact changes to commit."
            exit 0
          fi

          if [ -f "$STAGING" ]; then
            COMMIT_MSG="chore: stage ${BS_TARGET_SETS} BS sets (run ${RUN_ID}) [skip ci]"
          else
            COMMIT_MSG="chore: job state (run ${RUN_ID}) [skip ci]"
          fi

          git commit -m "$COMMIT_MSG"

          for i in 1 2 3 4; do
            if git fetch origin main && git rebase origin/main && git push origin HEAD:main; then
              echo "Push succeeded on attempt $i."
              exit 0
            fi
            git rebase --abort >/dev/null 2>&1 || true
            echo "Push attempt $i failed, retrying in 10s..."
            sleep 10
          done

          echo "Push failed after 4 attempts."
          exit 1
