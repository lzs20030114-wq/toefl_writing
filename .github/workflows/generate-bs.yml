name: 生成 Build Sentence 题目

on:
  workflow_dispatch:
    inputs:
      target_sets:
        description: '生成套数'
        required: true
        default: '6'
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate questions
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BS_TARGET_SETS: ${{ github.event.inputs.target_sets }}
        run: node scripts/generateBSQuestions.mjs

      - name: Commit updated questions
        env:
          BS_TARGET_SETS: ${{ github.event.inputs.target_sets }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/buildSentence/questions.json
          git add data/buildSentence/reserve_pool.json || true
          git diff --staged --quiet || git commit -m "chore: auto-generate ${BS_TARGET_SETS} BS question sets [skip ci]"
          git push
