name: Test — Email Send

# Tiny workflow to sanity-check the Gmail SMTP config without waiting for
# the full nightly pipeline. Triggers via workflow_dispatch only.
# Safe to delete after the first successful email arrives.

on:
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Compose fake summary
        run: |
          cat > ./summary.md <<'EOF'
          ## Email Test — $(date -u +%Y-%m-%d\ %H:%M\ UTC)

          If you're reading this in your Gmail inbox, **the nightly email pipeline works**.

          This is a one-off test send from the `test-email.yml` workflow. The real
          nightly summary will look like a table of how many questions each section
          generated, plus a link back to the workflow run.

          You can safely delete `.github/workflows/test-email.yml` after this works.
          EOF
          echo "::notice::Summary file ready"

      - name: Send test email
        if: vars.NIGHTLY_EMAIL_ENABLED == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: ${{ secrets.GMAIL_USER }}
          to: ${{ secrets.GMAIL_USER }}
          subject: "[Test] Nightly email pipeline OK"
          body: file://summary.md
          convert_markdown: true

      - name: Variable not set
        if: vars.NIGHTLY_EMAIL_ENABLED != 'true'
        run: |
          echo "::error::NIGHTLY_EMAIL_ENABLED is not 'true' — set it in repo Variables and re-run."
          exit 1
