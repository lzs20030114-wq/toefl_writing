name: Nightly — Generate Build Sentence Questions

# Auto-promotes 2 new BS sets straight into production each night.
# appendBSSets.mjs handles the generate → quality-gate → merge pipeline in one
# shot; if any quality check fails the script exits non-zero and we skip the
# commit. No staging step — the script writes directly to questions.json.

on:
  workflow_dispatch: {}
  workflow_call:
    outputs:
      added_sets:
        description: "Number of new BS sets appended to production"
        value: ${{ jobs.generate.outputs.added_sets }}
      status:
        description: "Result status: success | no-change | failure"
        value: ${{ jobs.generate.outputs.status }}

concurrency:
  group: generate-bs-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      added_sets: ${{ steps.summarize.outputs.added_sets }}
      status: ${{ steps.summarize.outputs.status }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Snapshot current set count
        id: before
        shell: bash
        run: |
          BEFORE=$(node -e "const j=require('./data/buildSentence/questions.json'); console.log((j.question_sets||[]).length);")
          echo "before=$BEFORE" >> "$GITHUB_OUTPUT"
          echo "BS sets before: $BEFORE"

      - name: Generate + quality-gate + merge (with one retry)
        id: generate
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_PROXY_URL: ${{ vars.DEEPSEEK_PROXY_URL }}
          BS_APPEND_SETS: "2"
        shell: bash
        run: |
          set -u
          # appendBSSets.mjs writes directly to data/buildSentence/questions.json
          # only after passing the quality gate. Failure → non-zero exit.
          for attempt in 1 2; do
            echo "── attempt $attempt ──"
            if node scripts/appendBSSets.mjs; then
              echo "Generation succeeded on attempt $attempt."
              exit 0
            fi
            echo "Attempt $attempt failed."
            if [ "$attempt" = "1" ]; then
              echo "Retrying once after 30s..."
              sleep 30
            fi
          done
          echo "Generation failed after 2 attempts."
          exit 1

      - name: Summarize delta
        id: summarize
        if: always()
        shell: bash
        run: |
          set -u
          AFTER=$(node -e "const j=require('./data/buildSentence/questions.json'); console.log((j.question_sets||[]).length);")
          BEFORE="${{ steps.before.outputs.before }}"
          ADDED=$((AFTER - BEFORE))
          echo "BS sets after: $AFTER (added $ADDED)"
          echo "added_sets=$ADDED" >> "$GITHUB_OUTPUT"
          if [ "${{ steps.generate.outcome }}" != "success" ]; then
            echo "status=failure" >> "$GITHUB_OUTPUT"
          elif [ "$ADDED" -gt 0 ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=no-change" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit + push updated production bank
        if: steps.generate.outcome == 'success'
        shell: bash
        run: |
          set -u
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- data/buildSentence/questions.json
          if git diff --staged --quiet; then
            echo "No production-bank changes to commit (this shouldn't happen post-success)."
            exit 0
          fi
          ADDED="${{ steps.summarize.outputs.added_sets }}"
          git commit -m "bot(nightly): +${ADDED} BS set(s) [skip ci]"
          for i in 1 2 3 4; do
            if git fetch origin main && git rebase origin/main && git push origin HEAD:main; then
              echo "Push succeeded on attempt $i."
              exit 0
            fi
            git rebase --abort >/dev/null 2>&1 || true
            echo "Push attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Push failed after 4 attempts."
          exit 1
