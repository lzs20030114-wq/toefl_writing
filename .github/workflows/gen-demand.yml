name: On-demand generation signal

# Computes data/.gen-demand.json — which of the 12 banks the nightly Claude
# routine should generate tonight, and how many items each. Runs at 17:30 UTC
# (= 01:30 Beijing), a buffer before the 03:00 routine so the file is fresh when
# the routine reads it.
#
# Reads the Supabase sessions table (aggregate only — the committed file never
# contains a user_code). Commits the file with [skip ci] only when it changed,
# using the same rebase-retry push as the other data jobs.

on:
  schedule:
    - cron: "30 17 * * *" # 17:30 UTC = 01:30 Beijing
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: gen-demand
  cancel-in-progress: false

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install deps
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Compute demand signal
        run: node scripts/compute-gen-demand.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Commit + push if changed
        shell: bash
        run: |
          git config user.name "gen-demand[bot]"
          git config user.email "gen-demand[bot]@users.noreply.github.com"
          git add data/.gen-demand.json
          if git diff --cached --quiet; then
            echo "No demand change — nothing to commit."
            exit 0
          fi
          git commit -m "chore(gen-demand): refresh demand signal $(date -u +%Y-%m-%d) [skip ci]"
          for i in 1 2 3 4; do
            if git pull --rebase origin main && git push origin main; then break; fi
            sleep 8
          done

      # 每晚对账邮件：demand 为空的夜晚 routine 按设计不出题，从外面看和
      # routine 挂了一模一样——这封邮件把两种情况区分开。它不依赖上面的
      # commit 步骤（无变化时该步骤提前 exit 0），直接读 compute 步骤写盘的
      # data/.gen-demand.json。
      - name: Build reconciliation email
        id: mail
        shell: bash
        run: |
          set -o pipefail
          node scripts/build-gen-demand-email.mjs --out /tmp/gen-demand-email.txt | tee /tmp/mail.out
          echo "subject=$(grep -E '^subject=' /tmp/mail.out | tail -1 | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

      # 邮件本身就是心跳：发不出去必须让 workflow 红掉（不加 continue-on-error）。
      - name: Send reconciliation email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: ${{ secrets.GMAIL_USER }}
          to: ${{ secrets.GMAIL_USER }}
          subject: ${{ steps.mail.outputs.subject }}
          body: file:///tmp/gen-demand-email.txt
