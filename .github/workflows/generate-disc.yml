name: Generate Academic Discussion Questions

on:
  workflow_dispatch:
    inputs:
      target_count:
        description: "Number of questions to generate"
        required: true
        default: "10"
        type: string

concurrency:
  group: generate-disc-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate questions to staging
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_PROXY_URL: ${{ vars.DEEPSEEK_PROXY_URL }}
          DISC_TARGET_COUNT: ${{ github.event.inputs.target_count }}
          DISC_OUTPUT_PATH: data/academicWriting/staging/${{ github.run_id }}.json
          DISC_JOB_STATE_PATH: data/academicWriting/staging/${{ github.run_id }}.state.json
        run: node scripts/generateDiscQuestions.mjs

      - name: Persist generated artifacts
        if: always()
        env:
          RUN_ID: ${{ github.run_id }}
          TARGET_COUNT: ${{ github.event.inputs.target_count }}
        shell: bash
        run: |
          set -u
          STAGING="data/academicWriting/staging/${RUN_ID}.json"
          STATE="data/academicWriting/staging/${RUN_ID}.state.json"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          FILES=()
          [ -f "$STAGING" ] && FILES+=("$STAGING")
          [ -f "$STATE" ] && FILES+=("$STATE")

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No artifacts to commit."
            exit 0
          fi

          git add -- "${FILES[@]}"
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          if [ -f "$STAGING" ]; then
            COMMIT_MSG="chore: stage ${TARGET_COUNT} disc questions (run ${RUN_ID}) [skip ci]"
          else
            COMMIT_MSG="chore: disc job state (run ${RUN_ID}) [skip ci]"
          fi

          git commit -m "$COMMIT_MSG"

          for i in 1 2 3 4; do
            if git fetch origin main && git rebase origin/main && git push origin HEAD:main; then
              echo "Push succeeded on attempt $i."
              exit 0
            fi
            git rebase --abort >/dev/null 2>&1 || true
            echo "Push attempt $i failed, retrying in 10s..."
            sleep 10
          done

          echo "Push failed after 4 attempts."
          exit 1
