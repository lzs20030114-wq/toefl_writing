name: Nightly Quality Monitor

# Deterministic regression watchdog. Runs ~04:30 Beijing (20:30 UTC), AFTER
# R1 (03:00) and R2 (03:30) routines have committed the night's batch.
#
# It catches what the per-night quality gate cannot:
#   - R1 didn't run at all (cron died / PAT expired / quota out) → STALE
#   - final BS still over the person-prefilled gate → PERSON_DRIFT
#   - slow downward trend across nights → TREND_DOWN
#   - the measurement / tpo_source.md broke → MACHINERY
#
# On regression: emails an alert. If specifically STALE (R1 absent), it also
# dispatches the DeepSeek fallback pipeline so the bank still gets fresh items.
# On a healthy night: silently commits the history row (no email — R1 already
# sent the nightly summary; this channel is reserved for "something's wrong").

on:
  schedule:
    - cron: "30 20 * * *" # 20:30 UTC = 04:30 Beijing
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write # needed to dispatch the fallback workflow

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Run quality monitor
        id: mon
        shell: bash
        run: |
          set -o pipefail
          node scripts/quality-monitor.mjs | tee /tmp/monitor.out
          echo "regression=$(grep -E '^regression=' /tmp/monitor.out | tail -1 | cut -d= -f2)" >> "$GITHUB_OUTPUT"
          echo "stale=$(grep -E '^stale=' /tmp/monitor.out | tail -1 | cut -d= -f2)" >> "$GITHUB_OUTPUT"
          # subject for the alert email
          echo "subject=⚠️ 题库质量退化告警 — $(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Commit history + report
        shell: bash
        run: |
          git config user.email "quality-monitor[bot]@users.noreply.github.com"
          git config user.name "quality-monitor[bot]"
          git add data/.quality-history.jsonl data/.quality-monitor-report.md
          if git diff --cached --quiet; then
            echo "No monitor changes to commit."
          else
            git commit -m "chore(monitor): nightly quality audit $(date -u +%Y-%m-%d) [skip ci]"
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break
              sleep 5
            done
          fi

      - name: Send alert email (regression only)
        if: steps.mon.outputs.regression == 'yes'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: ${{ secrets.GMAIL_USER }}
          to: ${{ secrets.GMAIL_USER }}
          subject: ${{ steps.mon.outputs.subject }}
          body: file://data/.quality-monitor-report.md
          convert_markdown: true

      - name: Auto-heal — dispatch fallback pipeline if R1 was stale
        if: steps.mon.outputs.stale == 'yes'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "R1 stale — dispatching DeepSeek fallback nightly-bank-refresh.yml so the bank still gets items today."
          gh workflow run nightly-bank-refresh.yml --ref main || echo "::warning::fallback dispatch failed (workflow may not accept dispatch); manual action needed"
