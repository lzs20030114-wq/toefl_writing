name: Nightly — Generate Reading CTW

# generate-ctw.mjs writes to data/reading/staging/ctw-${RUN_ID}.json with
# quality validation built in (validateCTWItem rejects bad items before write).
# merge-staging.mjs then promotes that one file into data/reading/bank/ctw.json.

on:
  workflow_dispatch: {}
  workflow_call:
    outputs:
      added_count:
        description: "Number of new CTW items merged into the bank"
        value: ${{ jobs.generate.outputs.added_count }}
      status:
        description: "Result status: success | no-change | failure"
        value: ${{ jobs.generate.outputs.status }}

concurrency:
  group: generate-ctw-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      added_count: ${{ steps.summarize.outputs.added_count }}
      status: ${{ steps.summarize.outputs.status }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Snapshot current bank count
        id: before
        shell: bash
        run: |
          BEFORE=$(node -e "const j=require('./data/reading/bank/ctw.json'); console.log((j.items||[]).length);")
          echo "before=$BEFORE" >> "$GITHUB_OUTPUT"
          echo "CTW items before: $BEFORE"

      - name: Generate to staging (with one retry)
        id: generate
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_PROXY_URL: ${{ vars.DEEPSEEK_PROXY_URL }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          set -u
          for attempt in 1 2; do
            echo "── attempt $attempt ──"
            if node scripts/generate-ctw.mjs --count 8; then
              exit 0
            fi
            echo "Attempt $attempt failed."
            [ "$attempt" = "1" ] && sleep 30
          done
          exit 1

      - name: Merge staging → bank
        if: steps.generate.outcome == 'success'
        env:
          MERGE_RUN_ID: ${{ github.run_id }}
        run: node scripts/merge-staging.mjs

      - name: Summarize delta
        id: summarize
        if: always()
        shell: bash
        run: |
          set -u
          AFTER=$(node -e "const j=require('./data/reading/bank/ctw.json'); console.log((j.items||[]).length);")
          BEFORE="${{ steps.before.outputs.before }}"
          ADDED=$((AFTER - BEFORE))
          echo "CTW items after: $AFTER (added $ADDED)"
          echo "added_count=$ADDED" >> "$GITHUB_OUTPUT"
          if [ "${{ steps.generate.outcome }}" != "success" ]; then
            echo "status=failure" >> "$GITHUB_OUTPUT"
          elif [ "$ADDED" -gt 0 ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=no-change" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit + push
        if: steps.generate.outcome == 'success'
        shell: bash
        run: |
          set -u
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Both the staging audit file and the bank file get committed.
          git add -- data/reading/bank/ctw.json
          STAGING_FILE="data/reading/staging/ctw-${{ github.run_id }}.json"
          [ -f "$STAGING_FILE" ] && git add -- "$STAGING_FILE"
          if git diff --staged --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          ADDED="${{ steps.summarize.outputs.added_count }}"
          git commit -m "bot(nightly): +${ADDED} CTW item(s) [skip ci]"
          for i in 1 2 3 4; do
            if git fetch origin main && git rebase origin/main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort >/dev/null 2>&1 || true
            sleep 10
          done
          exit 1
